<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 소켓 대전 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="arcadeFrame">

        <div id="authScreen" class="screen">
            <h1 class="title">2D ARENA</h1>
            <input required type="text" id="nickname" placeholder="닉네임">
            <input required type="password" id="password" placeholder="비밀번호">
            <div class="buttons">
                <button id="loginBtn">로그인</button>
                <button id="registerBtn">회원가입</button>
            </div>
            <p id="authMessage"></p>
        </div>

        <div id="lobbyScreen" class="screen hidden">
            <h2 id="welcomeMsg"></h2>
            <button id="matchBtn">⚔ 게임 매칭 찾기</button>
            <p id="matchStatus"></p>
        </div>

        <div id="gameScreen" class="screen hidden">
            <div class="ui-bar">
                <div class="hp-panel p1">
                    <div class="hp-name">PLAYER 1</div>
                    <div class="hp-track"><div id="myHpFill" class="hp-fill"></div></div>
                    <div id="myHpBar" class="hp-value">100</div>
                </div>
                <div class="hp-panel p2">
                    <div class="hp-name">PLAYER 2</div>
                    <div class="hp-track"><div id="enemyHpFill" class="hp-fill"></div></div>
                    <div id="enemyHpBar" class="hp-value">100</div>
                </div>
            </div>
            <div class="game-frame">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
            </div>
            <div class="controls">
                <span><span class="key">W A S D</span>이동</span>
                <span><span class="key">Z</span>칼</span>
                <span><span class="key">X</span>총</span>
                <span><span class="key">C</span>대시</span>
            </div>
        </div>

    </div>

    <div id="resultOverlay" class="hidden">
        <div class="result-panel">
            <h2 id="resultText"></h2>
            <button id="resultConfirmBtn">로비로 돌아가기</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="gameClient.js"></script>
</body>
</html>
